description: "filar agent eval — tool-calling on filar tasks (milestone v0.4.0)"

# Prompt under test = filar's real agent system prompt (SSH/POSIX remote
# variant), synced with crates/agent/src/agent.rs via the
# `system_prompt_matches_eval_snapshot` Rust test. agent-chat.json is a chat
# prompt: system message loaded from agent-system.txt + user {{question}}.
prompts:
  - file://prompts/agent-chat.json

# Tool schema mirrors crates/agent/src/tools.rs::tool_definitions(). It is a
# manual mirror (single-source sharing from Rust would need an export step);
# the asserts target the stable tool name `run_command`. The schema is defined
# once here (anchor &filar_tools) and attached to each provider's `config.tools`
# — promptfoo's OpenRouter/OpenAI provider sends `config.tools` to the API.
tools: &filar_tools
  - type: function
    function:
      name: run_command
      description: "Run a shell command on the target machine and return the output. Use this for system administration tasks like checking processes, inspecting logs, managing services, etc."
      parameters:
        type: object
        properties:
          command:
            type: string
            description: "The shell command to execute."
          explanation:
            type: string
            description: "A brief explanation of what this command does and why."
        required: ["command"]
  - type: function
    function:
      name: read_file
      description: "Read the contents of a file on the target machine. Uses `cat` under the hood."
      parameters:
        type: object
        properties:
          path:
            type: string
            description: "Absolute or relative path to the file."
        required: ["path"]
  - type: function
    function:
      name: list_dir
      description: "List the contents of a directory on the target machine. Uses `ls -la` under the hood."
      parameters:
        type: object
        properties:
          path:
            type: string
            description: "Absolute or relative path to the directory."
        required: ["path"]

# Providers — three models via OpenRouter. The key is read automatically from
# the OPENROUTER_API_KEY environment variable (methodology §6: no secrets in
# the repo). To change/add models, edit the `id:` lines below — the model id
# is the OpenRouter slug (see https://openrouter.ai/models).
providers:
  - id: openrouter:z-ai/glm-5.2
    label: GLM-5.2 (OpenRouter)
    config:
      temperature: 0
      max_tokens: 1024
      timeoutMs: 300000
      tools: *filar_tools
  - id: openrouter:qwen/qwen3.6-35b-a3b
    label: Qwen3.6-35B-A3B (OpenRouter)
    config:
      temperature: 0
      max_tokens: 1024
      timeoutMs: 300000
      tools: *filar_tools
  - id: openrouter:meta-llama/llama-3.1-8b-instruct
    label: Llama-3.1-8B-Instruct (OpenRouter)
    config:
      temperature: 0
      max_tokens: 1024
      timeoutMs: 300000
      tools: *filar_tools

# Dataset — 30 cases in three buckets (operations / safety / language), see
# eval/datasets/filar.yaml. Each case carries vars.bucket + vars.priority for
# filtering runs (e.g. only `operations`). The #72 smoke cases are now part of
# the dataset.
tests: file://datasets/filar.yaml

# Judge for llm-rubric asserts (safety nuance, language adherence). Per the
# methodology (§7.3) the judge must NOT be one of the compared models, so it is
# a different family (Gemini) reached via the same OPENROUTER_API_KEY.
defaultTest:
  options:
    provider:
      id: openrouter:google/gemini-2.5-flash
      config:
        temperature: 0
        max_tokens: 512
