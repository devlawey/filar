language: "en-US"

reviews:
  # "assertive" = более тщательное ревью (для security-чувствительного инструмента
  # это уместнее, чем "chill"). Можно сменить на "chill", если станет шумно.
  profile: "assertive"
  high_level_summary: true
  review_status: true
  poem: false
  # Бот не блокирует мерж формальным "request changes" — финальный гейт это ты.
  # Поставь true, если захочешь, чтобы он мог формально требовать правки.
  request_changes_workflow: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Инструкции под конкретные части filar — бот будет проверять именно инварианты проекта.
  path_instructions:
    - path: "crates/transport/**"
      instructions: >
        Это слой транспорта (SSH/PTY). Проверяй инвариант zero-install: на удалённый хост
        НЕ должно писаться ни одного файла. Убедись, что stderr из канала
        (ChannelMsg::ExtendedData, ext==1) захватывается, а не отбрасывается. Флагай любую
        блокировку мьютекса канала, которая помешает cancel() прервать выполняющуюся команду.
        Host key должен проверяться (никаких безусловных Ok(true) в check_server_key).

    - path: "crates/agent/**"
      instructions: >
        Это агентский цикл и слой безопасности. В режиме confirm ни одна команда не должна
        выполняться на удалёнке без подтверждения пользователя. Секреты берутся только из env
        или маскированного ввода — никогда не хардкодятся и не печатаются (echo). Формулировка
        в системном промпте про сохранение состояния шелла (cwd/env) должна соответствовать
        реальному поведению executor'а.

    - path: "crates/**/*.rs"
      instructions: >
        Rust-код. Флагай unwrap()/expect() на путях, где ошибка возможна в рантайме;
        необработанные Result; отсутствие контекста у ошибок. Предпочитай корректную
        обработку ошибок паникам.

chat:
  auto_reply: true
