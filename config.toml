# filar configuration
# API keys are NOT stored here — enter them in the GUI launcher.

confirm_mode = "allowlist"

[llm]
model = "glm-5.1"
api_base_url = "https://open.bigmodel.cn/api/paas/v4"
max_tokens = 4096

[timeouts]
command_secs = 120
llm_secs = 60
connect_secs = 15

# ── SSH targets ──────────────────────────────────────────────────────
# "local" (built-in) = commands run on your machine, no SSH needed.
# Add your servers below. To connect, select the name in the GUI Target dropdown
# or use: filar --target my-server

# Example: password auth (set SSH_PASSWORD env var or it will prompt)
[[ssh_targets]]
name = "test-docker"
host = "127.0.0.1"
port = 2222
user = "testuser"

[ssh_targets.auth]
type = "password"

# Example: key-based auth
# [[ssh_targets]]
# name = "my-server"
# host = "192.168.1.100"
# port = 22
# user = "admin"
#
# [ssh_targets.auth]
# type = "key"
# path = "~/.ssh/id_ed25519"
